<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>買房 vs 租房財務比較工具</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Prop-Types (Recharts 依賴) -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <!-- Recharts -->
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // 簡單的 Lucide 圖標組件封裝
        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            // 從視窗對象獲取 Recharts 組件以避免載入順序導致的未定義錯誤
            const { 
                AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer 
            } = window.Recharts || {};

            const [params, setParams] = useState({
                housePrice: 20000000,      // 房價
                downPaymentPct: 20,       // 首付比例
                interestRate: 2.1,        // 貸款利率
                loanTerm: 30,             // 貸款年限
                monthlyRent: 35000,       // 每月租金
                rentIncrease: 2,          // 租金年漲幅 (%)
                appreciationRate: 3,      // 房價年漲幅 (%)
                investmentReturn: 6,      // 投資報酬率 (%)
                maintenanceRate: 0.5,     // 房屋持有成本 (%)
            });

            const [compareYears, setCompareYears] = useState(30);

            const results = useMemo(() => {
                const data = [];
                const { 
                    housePrice, downPaymentPct, interestRate, loanTerm, 
                    monthlyRent, rentIncrease, appreciationRate, investmentReturn, maintenanceRate 
                } = params;

                const downPayment = housePrice * (downPaymentPct / 100);
                const loanAmount = housePrice - downPayment;
                const monthlyInterest = (interestRate / 100) / 12;
                const totalMonths = loanTerm * 12;

                const monthlyMortgage = totalMonths > 0 ? 
                    (loanAmount * monthlyInterest * Math.pow(1 + monthlyInterest, totalMonths)) / 
                    (Math.pow(1 + monthlyInterest, totalMonths) - 1) : 0;

                let buyTotalCost = downPayment;
                let rentTotalCost = 0;
                let currentHouseValue = housePrice;
                let rentInvestValue = downPayment; 
                let currentMonthlyRent = monthlyRent;

                for (let year = 1; year <= compareYears; year++) {
                    const annualMortgage = year <= loanTerm ? monthlyMortgage * 12 : 0;
                    const annualMaintenance = currentHouseValue * (maintenanceRate / 100);
                    buyTotalCost += (annualMortgage + annualMaintenance);
                    currentHouseValue *= (1 + appreciationRate / 100);

                    let remainingLoan = 0;
                    if (year < loanTerm) {
                        const monthsPassed = year * 12;
                        remainingLoan = loanAmount * (Math.pow(1 + monthlyInterest, totalMonths) - Math.pow(1 + monthlyInterest, monthsPassed)) / 
                            (Math.pow(1 + monthlyInterest, totalMonths) - 1);
                    }

                    const buyNetWorth = currentHouseValue - remainingLoan;
                    const annualRent = currentMonthlyRent * 12;
                    rentTotalCost += annualRent;
                    
                    rentInvestValue *= (1 + investmentReturn / 100);
                    const monthlyDiff = monthlyMortgage - currentMonthlyRent;
                    if (monthlyDiff > 0) {
                        rentInvestValue += monthlyDiff * 12 * (1 + investmentReturn / 200);
                    }
                    
                    currentMonthlyRent *= (1 + rentIncrease / 100);

                    data.push({
                        year,
                        '買房淨資產': Math.round(buyNetWorth / 10000),
                        '租房淨資產': Math.round(rentInvestValue / 10000),
                        '買房總支出': Math.round(buyTotalCost / 10000),
                        '租房總支出': Math.round(rentTotalCost / 10000),
                    });
                }
                return data;
            }, [params, compareYears]);

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setParams(prev => ({ ...prev, [name]: parseFloat(value) || 0 }));
            };

            const finalYearData = results[results.length - 1];

            if (!window.Recharts) {
                return <div className="p-8 text-center">正在載入圖表組件...</div>;
            }

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-6xl mx-auto">
                        <header className="mb-8 text-center">
                            <h1 className="text-3xl font-bold text-slate-800 flex items-center justify-center gap-2">
                                <Icon name="calculator" size={28} className="text-blue-600" /> 
                                買房 vs 租房長期財務比較工具
                            </h1>
                            <p className="text-slate-500 mt-2">評估複利、利率與房價增值對您財富的影響 (單位：萬 TWD)</p>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 space-y-6">
                                <h2 className="font-semibold text-lg flex items-center gap-2 border-b pb-2 text-blue-600">
                                    <Icon name="settings" size={20} /> 參數設定
                                </h2>
                                
                                <div className="space-y-4">
                                    <label className="block text-sm">
                                        <span className="text-slate-600">預計房價 (萬)</span>
                                        <input 
                                            type="number" value={params.housePrice / 10000} 
                                            onChange={(e) => setParams(p => ({...p, housePrice: e.target.value * 10000}))}
                                            className="w-full mt-1 p-2 bg-slate-100 rounded border-none focus:ring-2 focus:ring-blue-500"
                                        />
                                    </label>

                                    <div className="grid grid-cols-2 gap-4">
                                        <label className="block text-sm">
                                            <span className="text-slate-600">首付比例 (%)</span>
                                            <input type="number" name="downPaymentPct" value={params.downPaymentPct} onChange={handleInputChange} className="w-full mt-1 p-2 bg-slate-100 rounded border-none" />
                                        </label>
                                        <label className="block text-sm">
                                            <span className="text-slate-600">房貸利率 (%)</span>
                                            <input type="number" step="0.1" name="interestRate" value={params.interestRate} onChange={handleInputChange} className="w-full mt-1 p-2 bg-slate-100 rounded border-none" />
                                        </label>
                                    </div>

                                    <div className="grid grid-cols-2 gap-4">
                                        <label className="block text-sm">
                                            <span className="text-slate-600">月租金 (元)</span>
                                            <input type="number" name="monthlyRent" value={params.monthlyRent} onChange={handleInputChange} className="w-full mt-1 p-2 bg-slate-100 rounded border-none" />
                                        </label>
                                        <label className="block text-sm">
                                            <span className="text-slate-600">比較年限</span>
                                            <select value={compareYears} onChange={(e) => setCompareYears(parseInt(e.target.value))} className="w-full mt-1 p-2 bg-slate-100 rounded border-none">
                                                <option value={10}>10 年</option>
                                                <option value={20}>20 年</option>
                                                <option value={30}>30 年</option>
                                                <option value={40}>40 年</option>
                                            </select>
                                        </label>
                                    </div>

                                    <div className="pt-4 border-t space-y-4">
                                        <p className="text-xs font-bold text-slate-400 uppercase tracking-wider">進階預期</p>
                                        <label className="block text-sm">
                                            <span className="text-slate-600">房價年增率 (%)</span>
                                            <input type="number" step="0.1" name="appreciationRate" value={params.appreciationRate} onChange={handleInputChange} className="w-full mt-1 p-2 bg-slate-50 border border-slate-200 rounded" />
                                        </label>
                                        <label className="block text-sm">
                                            <span className="text-slate-600">投資報酬率 (%)</span>
                                            <input type="number" step="0.1" name="investmentReturn" value={params.investmentReturn} onChange={handleInputChange} className="w-full mt-1 p-2 bg-slate-50 border border-slate-200 rounded" />
                                        </label>
                                    </div>
                                </div>
                            </div>

                            <div className="lg:col-span-2 space-y-8">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div className="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-blue-500">
                                        <div className="flex items-center gap-2 text-slate-500 mb-1">
                                            <Icon name="home" />
                                            <span className="text-sm">買房端 {compareYears} 年後淨資產</span>
                                        </div>
                                        <div className="text-2xl font-bold text-slate-800">{finalYearData['買房淨資產'].toLocaleString()} 萬</div>
                                    </div>

                                    <div className="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-emerald-500">
                                        <div className="flex items-center gap-2 text-slate-500 mb-1">
                                            <Icon name="trending-up" />
                                            <span className="text-sm">租房端 {compareYears} 年後資產</span>
                                        </div>
                                        <div className="text-2xl font-bold text-slate-800">{finalYearData['租房淨資產'].toLocaleString()} 萬</div>
                                    </div>
                                </div>

                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                                    <h3 className="font-semibold mb-6">資產成長趨勢 (萬)</h3>
                                    <div className="h-[350px] w-full">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <AreaChart data={results}>
                                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                                <XAxis dataKey="year" />
                                                <YAxis tickFormatter={(val) => `${val/100}M`} />
                                                <Tooltip />
                                                <Legend verticalAlign="top" align="right" />
                                                <Area type="monotone" dataKey="買房淨資產" stroke="#3b82f6" fill="#3b82f6" fillOpacity={0.1} />
                                                <Area type="monotone" dataKey="租房淨資產" stroke="#10b981" fill="#10b981" fillOpacity={0.1} />
                                            </AreaChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
